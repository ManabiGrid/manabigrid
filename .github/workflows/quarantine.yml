# quarantine.yml — 内部語彙の混入検査と verify_required 削除検知（軽量CI）
# 目的: 公開ツリーに内部管理用の語彙・ID・フラグ・ローカルパスが混入したらCIで失敗させる。
#       PRで verify_required（要原典確認の印）の行が削除されていたらジョブを失敗させる
#       （正当な解除の手順は CONTRIBUTING.md「来歴のルール2」参照——メンテナ判断でoverride）。
# 実装メモ: 検査対象には .github も含める。検査パターンは文字クラス（[ ]）等で
#           ひと文字ずつ崩して書いてある。こう書かないと、このファイル自身の
#           パターン定義行が検査に引っかかるため（定義行だけを実質除外する方式）。
# 供給網対策: actions は commit SHA 固定・workflow permissions は contents: read のみ。

name: quarantine

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quarantine:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Internal vocabulary grep (fail on hit)
        run: |
          set -u
          PATTERNS='INTERNA[L][_]ONLY
          [/]Users[/]
          MERGE[_]LOG
          QA[_]REPORT
          submit[0-9]
          D[0-9]+[-]H[0-9]+
          \bD[0-9]{1,2}\b
          public[_]release[_]ready
          student[_]distribution[_]ready
          external[_]upload[_]ready
          sale[_]ready
          canonical[_]status
          run[_]id
          source[_]package
          オーナ[ー]
          監[督]
          改稿キュ[ー]'
          FAIL=0
          while IFS= read -r pat; do
            pat="$(echo "$pat" | sed 's/^ *//')"
            [ -z "$pat" ] && continue
            HITS="$(grep -rInE --binary-files=without-match \
              --exclude-dir=.git \
              -e "$pat" . || true)"
            if [ -n "$HITS" ]; then
              echo "::error::quarantine vocabulary detected (pattern: $pat)"
              echo "$HITS"
              FAIL=1
            fi
          done <<EOF
          $PATTERNS
          EOF
          exit "$FAIL"

      - name: Unicode evasion check (invisible chars / fullwidth IDs / normalized internal IDs)
        run: |
          python3 - <<'PYEOF'
          import os, re, subprocess, sys, unicodedata
          # 検査1: 不可視・結合系文字は全面禁止（R6対応で拡張）
          #        旧zero-width列挙（U+200B〜U+200D, U+2060, U+FEFF）に代えて、Unicodeカテゴリで
          #        網羅する: Cf（書式）・Mn/Me（結合）・異体字セレクタU+FE00〜FE0F。
          #        現在の公開ツリーにこれらの文字は0件であることを実測済み（正当な用途がない）。
          # R11対応: かなの濁点・半濁点系の修飾記号（U+3099〜309C・U+FF9E/FF9F）も除去対象。
          #        これらはNFKC正規化の途中で前の文字と合成されて語形そのものを変えるため
          #        （例: キ+半角濁点→ギ）、除去せずに正規化すると検疫語彙の照合をすり抜ける。
          #        現在の公開ツリーにこれらの文字は0件であることを実測済み（正当な用途がない）。
          def _is_invisible(ch):
              return (unicodedata.category(ch) in ("Cf", "Mn", "Me")
                      or 0xFE00 <= ord(ch) <= 0xFE0F
                      or 0x3099 <= ord(ch) <= 0x309C
                      or ord(ch) in (0xFF9E, 0xFF9F))
          # 照合前の除去: 不可視文字で語やIDを分断する回避（例: 結合書記素接合子での分断）を
          #        無効化するため、検出パターン照合は不可視文字を除去した文字列に対して行う
          def _strip_invisible(s):
              return "".join(ch for ch in s if not _is_invisible(ch))
          # 検査2: 全角数字・全角英字による内部ID偽装（例: 英大文字+全角数字、全角英字+数字）
          #        全角数字そのものは日本語本文で正当に使われるため、ID形の文脈に限定する
          fw_digit = "".join(chr(c) for c in range(0xFF10, 0xFF1A))   # 全角の0-9
          fw_upper = "".join(chr(c) for c in range(0xFF21, 0xFF3B))   # 全角のA-Z
          fake_id = re.compile("(?:[A-Z][" + fw_digit + "]|[" + fw_upper + "][0-9" + fw_digit + "])")
          # 検査3: NFKC正規化後の内部ID・内部ラベル（R3監査 指摘#2対応）
          #        パターン文字列は連結で崩して書く——このファイル自身の定義行が
          #        検査に引っかからないようにするため（既存grep方式と同じ趣旨）。
          #        区切り記号の集合は下の dash 文字列が正本（数は len(dash) の実測が正。
          #        文書側で「◯種」と数を要約すると数え方の版ズレが起きたため、数は書かない）。
          #        R6対応: 複合区切りの上限を撤廃（区切りの連続は長さ無制限で検出）
          dash = "-‐‑‒–—―−ー－" + "・･·./:_" + " " + "\u00A0" + "\t" + "•‣∙"
          sep = "[" + dash + "]+"
          pat_d_id = re.compile("(?<![0-9A-Za-z])" + "D" + sep + "[0-9]")
          pat_hr_id = re.compile("(?<![0-9A-Za-z])" + "H" + "R" + "(?:" + sep + ")?[0-9]")
          word_internal = "INTER" + "NAL"
          word_naibu = "内部" + "用"  # 「内部」+「用」の内部ラベル
          # R7対応: raw grep層の全検疫語彙を、NFKC正規化＋不可視除去後の文字列にも適用する
          #        （全角表記などNFKCで同定できる表記ゆれの見逃しを塞ぐ。語は連結で崩して書く）
          vocab_words = [
              "MERGE" + "_" + "LOG", "QA" + "_" + "REPORT",
              "public" + "_release" + "_ready", "student" + "_distribution" + "_ready",
              "external" + "_upload" + "_ready", "sale" + "_ready",
              "canonical" + "_status", "run" + "_id", "source" + "_package",
              "/" + "Users" + "/",
              "オー" + "ナー", "監" + "督", "改稿" + "キュー",
          ]
          vocab_res = [
              re.compile("submit" + "[0-9]"),
              re.compile("D" + "[0-9]+" + "-" + "H" + "[0-9]+"),
              re.compile(r"\b" + "D" + r"[0-9]{1,2}\b"),
          ]
          def check_line(line):
              issues = []
              if any(_is_invisible(ch) for ch in line):
                  issues.append("invisible/combining character")
              if fake_id.search(line):
                  issues.append("fullwidth-obfuscated ID")
              # R8対応: 除去→NFKC→再除去の反復適用。NFKC適用で初めて不可視・結合系に
              #        変わる文字（例: 半角濁点はLm→NFKCで結合文字Mn）も除去され、処理順に依存しない
              norm = _strip_invisible(unicodedata.normalize("NFKC", _strip_invisible(line)))
              if pat_d_id.search(norm):
                  issues.append("normalized internal D-id")
              if pat_hr_id.search(norm):
                  issues.append("normalized internal HR-id")
              if word_internal in norm:
                  issues.append("internal label (EN)")
              if word_naibu in norm:
                  issues.append("internal label (JA)")
              for w in vocab_words:
                  if w in norm:
                      issues.append("internal vocabulary (normalized)")
                      break
              for r in vocab_res:
                  if r.search(norm):
                      issues.append("internal id pattern (normalized)")
                      break
              return issues
          # 自己試験: 単一・複合・不可視分断の合成例を検出できることを実行のたびに確認する
          # （文字列は連結・chr()で崩して書く——このファイル自身が検査に引っかからないため）
          _selftest = [
              "D" + "-" + "1", "D" + "・" + "7", "D" + "・" + " " + "7",
              "D" + "：" + "-" + "7", "D" + "\t" + "7", "D" + "•" + "7",
              "H" + "R" + "3", "H" + "R" + "－" + "2",
              "D" + "・" * 4 + "7",                      # 複合区切りの上限超え（R6反例）
              "D" + "・" + chr(0x034F) + "7",           # 不可視文字での分断（R6反例）
              "INTER" + chr(0x034F) + "NAL",            # 不可視文字での語の分断（R6反例）
              "INTER" + chr(0x200B) + "NAL",            # zero-widthでの語の分断
              "ＭＥＲＧＥ" + "＿ＬＯＧ",                 # 全角表記の検疫語彙（R7反例）
              "ＱＡ" + "＿ＲＥＰＯＲＴ",                 # 全角表記の検疫語彙（R7反例）
              "ｒｕｎ" + "＿ｉｄ",                       # 全角小文字表記の検疫語彙
              "submit" + "１",                           # 全角数字を含むID語彙
              "Ｍ" + chr(0xFF9E) + "ＥＲＧＥ" + "＿ＬＯＧ",  # NFKC後に不可視化する文字での分断（R8反例）
              "Ｑ" + chr(0xFF9E) + "Ａ" + "＿ＲＥＰＯＲＴ",  # 同上（R8反例）
              "docs/" + "INTER" + "NAL" + "_ONLY_" + "D" + "-" + "7.txt",  # パス名だけに禁止語（R10反例）
              "materials/" + "MERGE" + "_" + "LOG" + ".md",               # 同上（R10反例）
              "改稿" + "キ" + chr(0xFF9E) + "ュー",       # 半角濁点のかな合成による語形変化（R11反例）
              "改稿" + "キ" + chr(0x309B) + "ュー",       # 濁点（スペース分解型）での分断
              "監" + chr(0xFF9E) + "督",                  # 合成相手のない位置への挿入
          ]
          for _s in _selftest:
              if not check_line(_s):
                  print("::error::quarantine self-test failed (synthetic evasion not detected)")
                  sys.exit(1)
          bad = []
          # R10対応: ファイル名・ディレクトリ名（パス文字列そのもの）にも同じ検出器を適用する
          #        （本文では止まる語彙がパスでは素通りする経路を塞ぐ）
          for root, dirs, files in os.walk("."):
              dirs[:] = [d for d in dirs if d != ".git"]
              for name in files:
                  path = os.path.join(root, name)
                  for issue in check_line(path):
                      bad.append(f"path:{path}: {issue}")
                  try:
                      text = open(path, encoding="utf-8").read()
                  except (UnicodeDecodeError, OSError):
                      continue
                  for i, line in enumerate(text.splitlines(), 1):
                      for issue in check_line(line):
                          bad.append(f"{path}:{i}: {issue}: {line.strip()[:80]}")
          # R9対応: 到達可能な全履歴（コミットメッセージ・作者・全blob）も同じ検出器で走査する。
          #        現在のツリーだけを見る検査では、過去コミットのtree・差分の削除側が漏れるため。
          #        裁定済みの偽陽性はallowlist（blob SHA→裁定理由）で管理し、監査が内容を検証できる。
          ALLOWLIST = {
              # ルートコミットの図版スクリプト旧版: 数式変数の減算式が英大文字+区切り+数字の
              # ID形パターンへ形式一致する偽陽性。後続コミットで変数名をDISTへ改名済み。
              # 内部IDでないことは監査R9が確認（2026-07-18裁定・詳細はRELEASE_RECORD）。
              "75a3250053374ee868b4219f535e88d2b0a61682": "math variable false positive (renamed to DIST later)",
          }
          def _git(*a):
              return subprocess.run(["git"] + list(a), capture_output=True).stdout
          for c in _git("rev-list", "--all").decode().split():
              meta = _git("log", "-1", "--format=%B%n%an %ae%n%cn %ce", c).decode(errors="replace")
              for i, line in enumerate(meta.splitlines(), 1):
                  for issue in check_line(line):
                      bad.append(f"history:{c[:12]}:meta:{i}: {issue}: {line.strip()[:80]}")
          seen = set()
          seen_paths = set()
          for entry in _git("rev-list", "--objects", "--all").decode(errors="replace").splitlines():
              parts = entry.split(" ", 1)
              sha, path = parts[0], (parts[1] if len(parts) > 1 else "")
              if path and path not in seen_paths:
                  seen_paths.add(path)
                  for issue in check_line(path):
                      bad.append(f"history:path:{path}: {issue}")
              if sha in seen:
                  continue
              seen.add(sha)
              if _git("cat-file", "-t", sha).decode().strip() != "blob":
                  continue
              if sha in ALLOWLIST:
                  continue
              try:
                  text = _git("cat-file", "blob", sha).decode("utf-8")
              except UnicodeDecodeError:
                  continue
              for i, line in enumerate(text.splitlines(), 1):
                  for issue in check_line(line):
                      bad.append(f"history:blob:{sha[:12]}:{path}:{i}: {issue}: {line.strip()[:80]}")
          if bad:
              print("::error::unicode evasion / internal-id detected")
              print("\n".join(bad))
              sys.exit(1)
          print("OK: no invisible / fullwidth-obfuscated / normalized internal IDs (worktree + full history)")
          PYEOF

      - name: Fail if verify_required lines are removed in PR diff
        if: github.event_name == 'pull_request'
        run: |
          set -u
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          REMOVED="$(git diff "$BASE" "$HEAD" -- . | grep -E '^-' | grep -v -E '^---' | grep -c 'verify_required' || true)"
          if [ "$REMOVED" -gt 0 ]; then
            echo "::error::This PR removes $REMOVED line(s) containing 'verify_required'. Removal is only accepted together with a source-verification record (CONTRIBUTING.md 来歴のルール2). A maintainer may override this failure after confirming the record."
            git diff "$BASE" "$HEAD" -- . | grep -E '^-' | grep -v -E '^---' | grep 'verify_required' || true
            exit 1
          fi
          echo "No verify_required removals detected."

      - name: Warn on .github changes in PR diff
        if: github.event_name == 'pull_request'
        run: |
          set -u
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          CHANGED="$(git diff --name-only "$BASE" "$HEAD" -- .github/ || true)"
          if [ -n "$CHANGED" ]; then
            echo "::warning::This PR changes files under .github/ (CI/テンプレートの変更はメンテナが必ず内容確認すること):"
            echo "$CHANGED"
          else
            echo "No .github changes."
          fi

  quality:
    # 品質の機械検査（リンク照合・アンカー照合・frontmatter検査・
    # ビュー生成器テスト・図版再生成検算）。内容は tools/ci_checks.py を参照。
    # 図版の再生成は一時ディレクトリで行い、リポジトリ内のSVGは書き換えない。
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install pinned PyYAML (frontmatter構文検査用)
        run: python3 -m pip install --quiet PyYAML==6.0.2

      - name: Run quality checks (links / anchors / frontmatter / view generator / figures / progress index)
        run: python3 tools/ci_checks.py
